<!DOCTYPE html>
<html>
<head>
    <title>Add to Watchlist</title>
</head>

<body>

<header>
    <h1>Add Movie / Series</h1>
</header>

<nav>
    <a href="index.html">Home</a>
</nav>

<main>
    <section>
        <article>
            <form method="POST">
                
                <label>Title:</label><br>
                <input type="text" name="title"><br><br>

                <label>Type:</label><br>
                <select name="type">
                    <option>Movie</option>
                    <option>Series</option>
                </select><br><br>

                <button type="submit">Add to Watchlist</button>

            </form>
        </article>
    </section>
</main>

<footer>
    <p>Movie Watchlist System</p>
</footer>

</body>
</html>
